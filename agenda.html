<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Agenda — Archivio Famiglia</title>
  <meta name="theme-color" content="#2c5f6f" />
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .card-appuntamento {
      background: var(--colore-superficie);
      border-radius: var(--raggio);
      box-shadow: var(--ombra);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      transition: transform 0.1s ease;
    }
    .card-appuntamento:active { transform: scale(0.99); }
    .data-badge {
      background: var(--colore-primario);
      color: white;
      border-radius: 8px;
      padding: 6px 10px;
      text-align: center;
      min-width: 52px;
      flex-shrink: 0;
    }
    .data-badge .giorno { font-size: 1.4rem; font-weight: 700; line-height: 1; }
    .data-badge .mese { font-size: 0.7rem; text-transform: uppercase; }
    .card-appuntamento.oggi .data-badge { background: var(--colore-accento); }
    .card-appuntamento.passato { opacity: 0.55; }
    .sezione-titolo {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--colore-testo-secondario);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin: 20px 0 8px;
    }
  </style>
</head>
<body>

  <div id="vista-login">
    <div class="login-box">
      <h2>Archivio Famiglia</h2>
      <form id="form-login">
        <div class="campo">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" required autocomplete="username" />
        </div>
        <div class="campo">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" required autocomplete="current-password" />
        </div>
        <button type="submit" id="btn-login" class="btn btn-primario btn-blocco">Accedi</button>
        <div class="errore-msg" id="login-errore"></div>
      </form>
    </div>
  </div>

  <div id="vista-app" class="nascosto">
    <header class="app-header">
      <h1>📅 Agenda</h1>
      <div class="utente-info">
        <a href="index.html" style="color:white; text-decoration:none; font-size:0.85rem;">← Archivio</a>
        <span id="nome-utente"></span>
        <button id="btn-logout" class="btn btn-secondario" style="padding:6px 12px; font-size:0.8rem;">Esci</button>
      </div>
    </header>

    <div class="container">
      <div id="lista-appuntamenti" class="lista-documenti">
        <div class="stato-vuoto">Caricamento...</div>
      </div>
    </div>

    <button id="fab-aggiungi" class="fab nascosto" title="Nuovo appuntamento">+</button>
  </div>

  <!-- Modale nuovo/modifica appuntamento -->
  <div id="modale-appuntamento" class="overlay nascosto">
    <div class="modale">
      <h2 id="modale-titolo-appuntamento">Nuovo appuntamento</h2>
      <form id="form-appuntamento">
        <div class="campo">
          <label for="app-titolo">Titolo</label>
          <input type="text" id="app-titolo" required placeholder="Es. Visita medico, Riunione commercialista..." />
        </div>
        <div class="campo">
          <label for="app-data">Data</label>
          <input type="date" id="app-data" required />
        </div>
        <div class="campo">
          <label for="app-ora">Ora (opzionale)</label>
          <input type="time" id="app-ora" />
        </div>
        <div class="campo">
          <label for="app-descrizione">Note (opzionale)</label>
          <textarea id="app-descrizione" rows="3" placeholder="Luogo, persone, dettagli..." style="resize:vertical;"></textarea>
        </div>
        <div class="modale-azioni">
          <button type="button" class="btn btn-secondario" id="btn-chiudi-modale-app">Annulla</button>
          <button type="submit" class="btn btn-accento" id="btn-salva-app">Salva</button>
        </div>
      </form>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>

  <script src="js/firebase-config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/agenda.js"></script>
</body>
</html>
