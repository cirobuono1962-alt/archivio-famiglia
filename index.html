<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Archivio Famiglia</title>
  <meta name="theme-color" content="#2c5f6f" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .tab-bar {
      display: flex;
      background: var(--colore-primario);
      gap: 8px;
      padding: 8px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.15);
    }
    .tab-btn {
      flex: 1;
      background: rgba(255,255,255,0.15);
      border: none;
      border-radius: 8px;
      color: rgba(255,255,255,0.8);
      padding: 10px 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .tab-btn.attivo {
      background: white;
      color: var(--colore-primario);
    }
    .tab-content { display: none; }
    .tab-content.attivo { display: block; }
    .card-appuntamento {
      background: var(--colore-superficie);
      border-radius: var(--raggio);
      box-shadow: var(--ombra);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
    }
    .data-badge {
      background: var(--colore-primario);
      color: white;
      border-radius: 8px;
      padding: 6px 10px;
      text-align: center;
      min-width: 52px;
      flex-shrink: 0;
    }
    .data-badge .giorno { font-size: 1.4rem; font-weight: 700; line-height: 1; }
    .data-badge .mese { font-size: 0.7rem; text-transform: uppercase; }
    .card-appuntamento.oggi .data-badge { background: var(--colore-accento); }
    .card-appuntamento.passato { opacity: 0.55; }
    .sezione-titolo {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--colore-testo-secondario);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin: 20px 0 8px;
    }
  </style>
</head>
<body>

  <div id="vista-login">
    <div class="login-box">
      <h2>Archivio Famiglia</h2>
      <form id="form-login">
        <div class="campo">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" required autocomplete="username" />
        </div>
        <div class="campo">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" required autocomplete="current-password" />
        </div>
        <button type="submit" id="btn-login" class="btn btn-primario btn-blocco">Accedi</button>
        <div class="errore-msg" id="login-errore"></div>
        <button type="button" id="btn-password-dimenticata" style="background:none; border:none; color:var(--colore-primario); font-size:0.85rem; cursor:pointer; margin-top:12px; text-decoration:underline;">Password dimenticata?</button>
        <div id="reset-messaggio" style="font-size:0.85rem; margin-top:8px; display:none;"></div>
      </form>
    </div>
  </div>

  <div id="vista-app" class="nascosto">
    <header class="app-header">
      <h1>📁 Archivio Famiglia</h1>
      <div class="utente-info">
        <span id="nome-utente"></span>
        <button id="btn-cambia-password" class="btn btn-secondario" style="padding:6px 12px; font-size:0.8rem;">🔑</button>
        <button id="btn-logout" class="btn btn-secondario" style="padding:6px 12px; font-size:0.8rem;">Esci</button>
      </div>
    </header>

    <div class="tab-bar">
      <button class="tab-btn attivo" data-tab="archivio">📁 Archivio</button>
      <button class="tab-btn" data-tab="agenda">📅 Agenda</button>
    </div>

    <div id="tab-archivio" class="tab-content attivo">
      <div class="container">
        <div class="toolbar">
          <input type="text" id="input-ricerca" placeholder="Cerca per titolo o tag..." />
          <select id="select-categoria-filtro"></select>
          <select id="select-anno-filtro"><option value="">Tutti gli anni</option></select>
        </div>
        <div id="banner-scadenze" class="nascosto" style="background:#fff8e1; border:1px solid #ffb300; border-radius:var(--raggio); padding:14px 16px; margin-bottom:16px;"></div>
        <div id="lista-documenti" class="lista-documenti">
          <div class="stato-vuoto">Caricamento...</div>
        </div>
      </div>
      <button id="fab-carica" class="fab nascosto" title="Carica documento">+</button>
    </div>

    <div id="tab-agenda" class="tab-content">
      <div class="container">
        <div id="lista-appuntamenti" class="lista-documenti">
          <div class="stato-vuoto">Caricamento...</div>
        </div>
      </div>
      <button id="fab-aggiungi" class="fab nascosto" title="Nuovo appuntamento">+</button>
    </div>
  </div>

  <!-- Modale carica documento -->
  <div id="modale-carica" class="overlay nascosto">
    <div class="modale">
      <h2>Carica documento</h2>
      <form id="form-carica">
        <div class="campo"><label for="upload-titolo">Titolo</label><input type="text" id="upload-titolo" required placeholder="Es. Bolletta luce gennaio" /></div>
        <div class="campo"><label for="upload-categoria">Categoria</label><select id="upload-categoria" required></select></div>
        <div class="campo"><label for="upload-intestatario">Intestatario</label><input type="text" id="upload-intestatario" placeholder="Es. Ciro, Mamma, Casa..." /></div>
        <div class="campo"><label for="upload-data">Data documento</label><input type="date" id="upload-data" /></div>
        <div class="campo"><label for="upload-tag">Tag (separati da virgola)</label><input type="text" id="upload-tag" placeholder="Es. energia, 2026, urgente" /></div>
        <div class="campo"><label for="upload-scadenza">Data scadenza (opzionale)</label><input type="date" id="upload-scadenza" /></div>
        <div class="campo"><label for="upload-preavviso">Avvisa con anticipo di</label>
          <select id="upload-preavviso">
            <option value="7">7 giorni prima</option>
            <option value="15">15 giorni prima</option>
            <option value="30" selected>30 giorni prima</option>
            <option value="60">60 giorni prima</option>
            <option value="90">90 giorni prima</option>
          </select>
        </div>
        <div class="campo"><label for="upload-file">File (puoi selezionarne più di uno)</label><input type="file" id="upload-file" required multiple accept=".pdf,.jpg,.jpeg,.png,.heic" /></div>
        <div id="upload-progresso" class="barra-progresso nascosto"><div id="upload-progresso-fill" class="barra-progresso-fill" style="width:0%"></div></div>
        <div class="modale-azioni">
          <button type="button" id="btn-chiudi-modale" class="btn btn-secondario">Annulla</button>
          <button type="submit" id="btn-upload-submit" class="btn btn-accento">Carica</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Modale appuntamento -->
  <div id="modale-appuntamento" class="overlay nascosto">
    <div class="modale">
      <h2 id="modale-titolo-appuntamento">Nuovo appuntamento</h2>
      <form id="form-appuntamento">
        <div class="campo"><label for="app-titolo">Titolo</label><input type="text" id="app-titolo" required placeholder="Es. Visita medico, Riunione..." /></div>
        <div class="campo"><label for="app-data">Data</label><input type="date" id="app-data" required /></div>
        <div class="campo"><label for="app-ora">Ora (opzionale)</label><input type="time" id="app-ora" /></div>
        <div class="campo"><label for="app-descrizione">Note (opzionale)</label><textarea id="app-descrizione" rows="3" placeholder="Luogo, persone, dettagli..." style="resize:vertical;"></textarea></div>
        <div class="modale-azioni">
          <button type="button" class="btn btn-secondario" id="btn-chiudi-modale-app">Annulla</button>
          <button type="submit" class="btn btn-accento" id="btn-salva-app">Salva</button>
        </div>
      </form>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>

  <script src="js/firebase-config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/documenti.js"></script>
  <script src="js/app.js"></script>

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("service-worker.js").catch((err) => {
          console.warn("Service worker non registrato:", err);
        });
      });
    }
  </script>
</body>
</html>
